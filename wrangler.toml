name = "giftlinks"
main = "src/index.js"
compatibility_date = "2025-12-01"

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

[assets]
directory = "./public"

[[d1_databases]]
binding = "DB"
database_name = "giftlinks"
database_id = "b721666e-f92b-4125-9fe6-be88ba08fb76"

[triggers]
# Daily maintenance cron must also match check in src/index.js scheduled()
crons = ["*/3 * * * *", "0 4 * * *"]

[[routes]]
pattern = "giftlinks.net/*"
zone_id = "e815e580ea88bb1434888185ea3e3768"

[[routes]]
pattern = "www.giftlinks.net/*"
zone_id = "e815e580ea88bb1434888185ea3e3768"

[observability]
enabled = true

[observability.traces]
enabled = true

[placement]
# TODO: temporary placement hint to try to avoid problematic EWR datacenter
region = "aws:us-east-2"

[vars]
DEFAULT_TTL_DAYS = "14"
DEFAULT_MAX_VIEWS = "0"
MAX_REFRESH_FAILURES = "5"
BOT_EMAIL = "bot@giftlinks.net"
# ADMIN_PASSWORD, PUSHOVER_USER, PUSHOVER_TOKEN set via: wrangler secret put <NAME>
# Pushover: create app at https://pushover.net/apps/build, user key at https://pushover.net

# --- Staging environment ---
# Deploy: wrangler deploy --env staging
# Secrets: wrangler secret put ADMIN_PASSWORD --env staging
[env.staging]
vars = { DEFAULT_TTL_DAYS = "14", DEFAULT_MAX_VIEWS = "0", MAX_REFRESH_FAILURES = "5", BOT_EMAIL = "staging@giftlinks.net" }

[[env.staging.d1_databases]]
binding = "DB"
database_name = "giftlinks-staging"
database_id = "5a7d4684-977d-4ae8-9aac-7b6823e279ef"

[[env.staging.routes]]
pattern = "staging.giftlinks.net/*"
zone_id = "e815e580ea88bb1434888185ea3e3768"
