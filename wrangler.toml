name = "giftlinks"
main = "src/index.js"
compatibility_date = "2025-12-01"

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

[assets]
directory = "./public"

[[d1_databases]]
binding = "DB"
database_name = "giftlinks"
database_id = "b721666e-f92b-4125-9fe6-be88ba08fb76"

[triggers]
crons = ["0 4 * * *"]

[[routes]]
pattern = "giftlinks.net/*"
zone_id = "e815e580ea88bb1434888185ea3e3768"

[[routes]]
pattern = "www.giftlinks.net/*"
zone_id = "e815e580ea88bb1434888185ea3e3768"

[observability]
enabled = true

[observability.traces]
enabled = true

[vars]
GIFT_TTL_DAYS = "14"
MAX_REFRESH_FAILURES = "5"
BOT_EMAIL = "bot@giftlinks.net"
# ADMIN_PASSWORD set via: wrangler secret put ADMIN_PASSWORD
